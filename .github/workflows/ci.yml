name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-13
          - target: linux-x64-gnu
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up the pinned Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Enable the pinned pnpm release
        run: |
          corepack enable
          corepack install --global pnpm@10.26.1
      - name: Install locked dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install supported-target prerequisites
        run: bash scripts/release/install-prerequisites.sh ${{ matrix.target }}
      - name: Verify release metadata and dependency advisories
        run: |
          pnpm run release:verify
          pnpm run security:audit
      - name: Run web, EPUB, PDF, and every print-profile check
        run: |
          pnpm run check
          pnpm run profiles:verify
      - name: Build and smoke-test a production-only release bundle
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          pnpm run release:bundle -- --target ${{ matrix.target }} --output dist/ci-release
          pnpm run release:smoke -- --archive dist/ci-release/bookforge-$VERSION-${{ matrix.target }}.tar.gz
